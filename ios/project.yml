name: BandMusicGames

options:
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  bundleIdPrefix: party.bandmusicgames

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    from: 4.6.0

targets:
  BandMusicGames:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BandMusicGames
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.party.bandmusicgames.app
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6P24N3R4TP
        INFOPLIST_FILE: Info.plist
        CURRENT_PROJECT_VERSION: "20260520230000"
        ENABLE_PREVIEWS: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    info:
      path: Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - bandmusicgames
            CFBundleURLName: com.party.bandmusicgames.app
        ITSAppUsesNonExemptEncryption: false
        LSApplicationQueriesSchemes:
          - spotify
    dependencies:
      - sdk: WebKit.framework
      - sdk: AuthenticationServices.framework
      - package: Lottie
        product: Lottie
