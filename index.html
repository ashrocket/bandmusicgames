<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960">
<title>BAND MUSIC GAMES</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #faf6ff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100svh;
  font-family: 'Quicksand', sans-serif;
  overflow-x: hidden;
  overflow-y: auto;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 18% 12%, rgba(255, 200, 232, 0.55) 0%, transparent 40%),
    radial-gradient(ellipse at 82% 88%, rgba(180, 210, 255, 0.55) 0%, transparent 40%),
    radial-gradient(ellipse at 62% 28%, rgba(220, 200, 255, 0.35) 0%, transparent 35%);
  pointer-events: none;
  z-index: 0;
}

#bg-glow {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  transition: background 0.9s ease;
}

/* ── iPod body ── */
#cabinet {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 960px;
  background: linear-gradient(155deg, #ffffff 0%, #faf8ff 55%, #fff5fc 100%);
  border: 1px solid rgba(220, 210, 245, 0.6);
  border-radius: 48px;
  padding: 0 0 28px 0;
  box-shadow:
    0 50px 120px rgba(100, 70, 200, 0.12),
    0 20px 40px rgba(0, 0, 0, 0.06),
    0 4px 8px rgba(0, 0, 0, 0.03),
    inset 0 1px 0 rgba(255, 255, 255, 1);
}

/* ── Header ── */
#marquee {
  width: 100%;
  background: transparent;
  border-bottom: 1px solid rgba(220, 210, 245, 0.35);
  border-radius: 48px 48px 0 0;
  padding: 22px 40px 18px;
  text-align: center;
}

#marquee span { display: block; }

#marquee span:first-child {
  font-family: 'Raleway', sans-serif;
  font-size: 25px;
  font-weight: 800;
  letter-spacing: 0.22em;
  background: linear-gradient(135deg, #f472b6 0%, #a855f7 50%, #60a5fa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-transform: uppercase;
}

.marquee-sub {
  font-family: 'Quicksand', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: #c4b5d8;
  letter-spacing: 0.45em;
  margin-top: 5px;
  text-transform: uppercase;
}

/* ── Screen ── */
#screen-bezel {
  margin: 16px 30px 0;
  width: 900px;
  height: 520px;
  background: #f4f1fb;
  border: 1px solid rgba(210, 200, 240, 0.4);
  border-radius: 20px;
  box-shadow: inset 0 2px 10px rgba(100, 80, 180, 0.06);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

#screen-bezel::after { display: none; }

#dial-canvas {
  display: block;
  width: 900px;
  height: 520px;
  touch-action: none;
}

/* ── Overlay ── */
#spotify-overlay {
  position: absolute;
  inset: 0;
  background: rgba(248, 245, 255, 0.88);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 20px;
}

#spotify-overlay.hidden { display: none; }

#overlay-content {
  text-align: center;
  border: 1px solid rgba(210, 200, 240, 0.35);
  border-radius: 28px;
  padding: 48px 64px;
  background: rgba(255, 255, 255, 0.92);
  box-shadow:
    0 24px 64px rgba(130, 80, 220, 0.12),
    0 8px 20px rgba(0, 0, 0, 0.04);
}

#overlay-title {
  font-family: 'Raleway', sans-serif;
  font-size: 30px;
  font-weight: 800;
  background: linear-gradient(135deg, #f472b6, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.18em;
  margin-bottom: 8px;
  text-transform: uppercase;
}

#overlay-sub {
  font-family: 'Quicksand', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: #bbb0cc;
  letter-spacing: 0.22em;
  margin-bottom: 40px;
  text-transform: uppercase;
}

#overlay-content button {
  display: block;
  width: 100%;
  padding: 15px 32px;
  margin: 12px 0;
  border-radius: 16px;
  font-family: 'Quicksand', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  text-transform: uppercase;
  outline: none;
}

#btn-connect {
  background: #1DB954;
  color: #000;
  border: none;
  box-shadow: 0 8px 28px rgba(29, 185, 84, 0.35);
}
#btn-connect:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(29, 185, 84, 0.45);
}
#btn-connect:active { transform: translateY(0); }

#btn-apple {
  background: #000;
  color: #fff;
  border: none;
  box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
}
#btn-apple:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(0, 0, 0, 0.28);
}
#btn-apple:active { transform: translateY(0); }
#btn-apple:disabled { opacity: 0.35; cursor: default; transform: none; }

#overlay-mobile-note {
  font-size: 11px;
  color: #b0a0c8;
  margin: -2px 0 6px;
  line-height: 1.5;
}
#overlay-mobile-note strong { color: #9080b8; }

#btn-skip {
  background: transparent;
  color: #c4b5d8;
  border: 1.5px solid rgba(210, 200, 240, 0.5);
  font-size: 11px;
  font-weight: 600;
}
#btn-skip:hover {
  color: #a895c0;
  background: rgba(240, 235, 255, 0.5);
}

/* ── Song info ── */
#song-info {
  margin-top: 20px;
  text-align: center;
  min-height: 72px;
}

#song-title {
  font-family: 'Raleway', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: #1e1b4b;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: color 0.45s ease;
}

#song-artist {
  font-family: 'Quicksand', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: #a78bfa;
  letter-spacing: 0.3em;
  margin-top: 5px;
  text-transform: uppercase;
}

#game-name {
  font-family: 'Quicksand', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: #c8bcd8;
  letter-spacing: 0.25em;
  margin-top: 3px;
  text-transform: uppercase;
}

#enter-hint {
  font-family: 'Quicksand', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: #a855f7;
  letter-spacing: 0.38em;
  margin-top: 8px;
  text-transform: uppercase;
  animation: pulse-hint 2s ease-in-out infinite;
}

@keyframes pulse-hint {
  0%, 100% { opacity: 0.45; }
  50%       { opacity: 1; }
}

/* ── Bottom label ── */
#controls-label {
  margin-top: 12px;
  font-family: 'Quicksand', sans-serif;
  font-size: 9px;
  font-weight: 500;
  color: #d4c8e8;
  letter-spacing: 0.35em;
  text-transform: uppercase;
}

#cabinet::before, #cabinet::after { content: none; }
</style>
</head>
<body>

<div id="bg-glow"></div>

<div id="cabinet">
  <div id="marquee">
    <span>BAND MUSIC GAMES</span>
    <span class="marquee-sub">SELECT A SONG TO PLAY</span>
  </div>

  <div id="screen-bezel">
    <canvas id="dial-canvas"></canvas>

    <div id="spotify-overlay">
      <div id="overlay-content">
        <div id="overlay-title">HEY THERE</div>
        <div id="overlay-sub">CONNECT YOUR MUSIC TO PLAY</div>
        <button id="btn-connect">&#9654; CONNECT SPOTIFY</button>
        <button id="btn-apple">&#9835; CONNECT APPLE MUSIC</button>
        <p id="overlay-mobile-note">On mobile: after connecting, open the <strong>Spotify app</strong> on your phone before entering a game — music plays through it.</p>
        <button id="btn-skip">PLAY WITHOUT MUSIC</button>
      </div>
    </div>
  </div>

  <div id="song-info">
    <div id="song-title">SELECT A GAME</div>
    <div id="song-artist"></div>
    <div id="game-name"></div>
    <div id="enter-hint"></div>
  </div>

  <div id="controls-label">SCROLL · SWIPE · TILT &nbsp;·&nbsp; TAP TO ENTER</div>
</div>

<script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js"></script>
<script src="config.js"></script>
<script src="js/spotify.js"></script>
<script src="js/applemusic.js"></script>
<script src="js/haptics.js"></script>
<script src="js/lobby.js"></script>
<script>
  document.getElementById('btn-connect').addEventListener('click', () => LobbyAuth.login());
  document.getElementById('btn-skip').addEventListener('click', () => {
    window._saveSpotifySkip();
    document.getElementById('spotify-overlay').classList.add('hidden');
  });

  const appleBtn = document.getElementById('btn-apple');
  // Disable Apple Music button if developer token not configured
  if (!LOBBY_CONFIG.appleMusicDeveloperToken ||
      LOBBY_CONFIG.appleMusicDeveloperToken === 'REPLACE_WITH_DEVELOPER_TOKEN') {
    appleBtn.disabled = true;
    appleBtn.title = 'Apple Music not yet configured';
  } else {
    appleBtn.addEventListener('click', async () => {
      appleBtn.textContent = 'CONNECTING…';
      appleBtn.disabled = true;
      const ok = await AppleMusicAuth.authorize();
      if (ok) {
        document.getElementById('spotify-overlay').classList.add('hidden');
      } else {
        appleBtn.textContent = '♩ CONNECT APPLE MUSIC';
        appleBtn.disabled = false;
      }
    });
  }
</script>
<script>
(function () {
  var cab = document.getElementById('cabinet');
  function fit() {
    var s = Math.min(1, window.innerWidth / 960);
    cab.style.zoom = s < 1 ? String(s) : '';
  }
  fit();
  window.addEventListener('resize', fit);
})();
</script>
<button id="motion-btn" aria-label="Enable tilt controls" style="display:none;position:fixed;bottom:20px;right:20px;z-index:9999;background:rgba(255,255,255,0.9);color:#a855f7;border:1px solid rgba(168,85,247,0.3);border-radius:20px;padding:7px 14px;font-size:11px;font-family:'Quicksand',sans-serif;letter-spacing:.06em;cursor:pointer;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-weight:600;">↺ TILT</button>
</body>
</html>
