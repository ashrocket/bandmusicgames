<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAND MUSIC GAMES</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0800;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: monospace;
  overflow: hidden;
}

/* ── Cabinet shell ── */
#cabinet {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 960px;
  background: linear-gradient(180deg, #1a1200 0%, #0d0900 40%, #080600 100%);
  border: 3px solid #3a2800;
  border-radius: 18px 18px 8px 8px;
  padding: 0 0 24px 0;
  box-shadow:
    0 0 60px rgba(255,140,0,0.15),
    0 0 120px rgba(255,80,0,0.08),
    inset 0 0 40px rgba(0,0,0,0.7);
  position: relative;
}

/* ── Marquee ── */
#marquee {
  width: 100%;
  background: linear-gradient(90deg, #0a0600, #1a0e00, #2a1600, #1a0e00, #0a0600);
  border-bottom: 3px solid #4a3000;
  border-radius: 16px 16px 0 0;
  padding: 16px 32px 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

#marquee::before,
#marquee::after {
  content: '';
  position: absolute;
  top: 8px; bottom: 8px;
  width: 6px;
  border-radius: 3px;
  background: radial-gradient(ellipse at center, #ffaa00 0%, #ff6600 40%, transparent 100%);
  box-shadow: 0 0 8px #ffaa00, 0 0 16px #ff6600;
  animation: blink 1.2s step-end infinite;
}
#marquee::before { left: 24px; }
#marquee::after  { right: 24px; }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.15; }
}

#marquee span {
  display: block;
  letter-spacing: 0.28em;
  text-transform: uppercase;
}
#marquee span:first-child {
  font-size: 28px;
  font-weight: bold;
  color: #ffcc00;
  text-shadow: 0 0 10px #ffaa00, 0 0 30px #ff8800, 0 0 60px rgba(255,100,0,0.4);
}
.marquee-sub {
  font-size: 11px;
  color: #884400;
  letter-spacing: 0.5em;
  margin-top: 4px;
}

/* ── Screen bezel ── */
#screen-bezel {
  margin: 18px 30px 0;
  width: 900px;
  height: 520px;
  background: #000;
  border: 6px solid #2a1e00;
  border-radius: 8px;
  box-shadow:
    inset 0 0 30px rgba(255,140,0,0.08),
    inset 0 0 6px rgba(0,0,0,0.9),
    0 0 20px rgba(255,100,0,0.12);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

/* CRT vignette */
#screen-bezel::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center,
    transparent 55%,
    rgba(0,0,0,0.55) 100%);
  pointer-events: none;
  z-index: 2;
}

#dial-canvas {
  display: block;
  width: 900px;
  height: 520px;
}

/* ── Spotify overlay ── */
#spotify-overlay {
  position: absolute;
  inset: 0;
  background: rgba(2, 1, 0, 0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  backdrop-filter: blur(2px);
}

#spotify-overlay.hidden { display: none; }

#overlay-content {
  text-align: center;
  border: 2px solid #3a2800;
  padding: 40px 52px;
  background: linear-gradient(180deg, #0d0900 0%, #080600 100%);
  box-shadow: 0 0 40px rgba(255,100,0,0.15), inset 0 0 20px rgba(0,0,0,0.8);
}

#overlay-title {
  font-size: 36px;
  font-weight: bold;
  color: #ffcc00;
  letter-spacing: 0.3em;
  text-shadow: 0 0 12px #ffaa00, 0 0 40px rgba(255,140,0,0.5);
  margin-bottom: 10px;
  animation: flicker 3.5s infinite;
}

@keyframes flicker {
  0%, 95%, 100% { opacity: 1; }
  96%            { opacity: 0.85; }
  97%            { opacity: 1; }
  98%            { opacity: 0.7; }
  99%            { opacity: 1; }
}

#overlay-sub {
  font-size: 13px;
  color: #996633;
  letter-spacing: 0.25em;
  margin-bottom: 36px;
}

#overlay-content button {
  display: block;
  width: 100%;
  padding: 14px 32px;
  margin: 12px 0;
  background: transparent;
  border: 2px solid;
  font-family: monospace;
  font-size: 14px;
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, box-shadow 0.15s;
  text-transform: uppercase;
}

#btn-connect {
  border-color: #ffaa00;
  color: #ffcc44;
  text-shadow: 0 0 8px #ffaa00;
}
#btn-connect:hover {
  background: rgba(255,160,0,0.15);
  box-shadow: 0 0 16px rgba(255,140,0,0.4);
}

#btn-skip {
  border-color: #3a3020;
  color: #664422;
  font-size: 11px;
}
#btn-skip:hover {
  background: rgba(100,60,10,0.15);
  color: #997744;
}

/* ── Song info panel ── */
#song-info {
  margin-top: 18px;
  text-align: center;
  min-height: 70px;
}

#song-title {
  font-size: 20px;
  font-weight: bold;
  color: #ffcc00;
  letter-spacing: 0.25em;
  text-shadow: 0 0 10px rgba(255,180,0,0.5);
}

#song-artist {
  font-size: 12px;
  color: #cc8800;
  letter-spacing: 0.35em;
  margin-top: 5px;
}

#game-name {
  font-size: 11px;
  color: #554422;
  letter-spacing: 0.3em;
  margin-top: 3px;
}

#enter-hint {
  font-size: 10px;
  color: #ffaa00;
  letter-spacing: 0.4em;
  margin-top: 8px;
  opacity: 0.75;
  animation: pulse-hint 1.8s ease-in-out infinite;
}

@keyframes pulse-hint {
  0%, 100% { opacity: 0.4; }
  50%       { opacity: 0.9; }
}

/* ── Bottom label ── */
#controls-label {
  margin-top: 12px;
  font-size: 10px;
  color: #3a2a10;
  letter-spacing: 0.35em;
  text-transform: uppercase;
}

/* ── Side bolt decorations ── */
#cabinet::before,
#cabinet::after {
  content: '●';
  position: absolute;
  top: 80px;
  font-size: 10px;
  color: #3a2800;
  text-shadow: 0 0 4px rgba(255,100,0,0.2);
}
#cabinet::before { left: 12px; }
#cabinet::after  { right: 12px; }
</style>
</head>
<body>

<div id="cabinet">
  <div id="marquee">
    <span>BAND MUSIC GAMES</span>
    <span class="marquee-sub">INSERT COIN TO PLAY</span>
  </div>

  <div id="screen-bezel">
    <canvas id="dial-canvas"></canvas>

    <div id="spotify-overlay">
      <div id="overlay-content">
        <div id="overlay-title">INSERT COIN</div>
        <div id="overlay-sub">CONNECT SPOTIFY TO PLAY</div>
        <button id="btn-connect">&#9654; CONNECT SPOTIFY</button>
        <button id="btn-skip">PLAY WITHOUT MUSIC</button>
      </div>
    </div>
  </div>

  <div id="song-info">
    <div id="song-title">SELECT A GAME</div>
    <div id="song-artist"></div>
    <div id="game-name"></div>
    <div id="enter-hint"></div>
  </div>

  <div id="controls-label">SCROLL TO ROTATE &nbsp;·&nbsp; CLICK TO ENTER</div>
</div>

<script src="config.js"></script>
<script src="js/spotify.js"></script>
<script src="js/lobby.js"></script>
</body>
</html>
